<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รัฐธรรมนูญแห่งราชอาณาจักรไทย (ฉบับจำลอง)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0d;
            --card-bg: rgba(22, 22, 26, 0.7);
            --border-color: rgba(212, 175, 55, 0.2);
            --gold-accent: #d4af37;
            --gold-hover: #f3e5ab;
            --text-color: #e4e4e7;
            --text-muted: #a1a1aa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.03) 0%, transparent 40%);
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
            z-index: 1;
            animation: fadeIn 1s ease-out;
        }

        .emblem-container {
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }

        .emblem-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(10px);
        }

        .emblem {
            width: 140px;
            height: auto;
            filter: drop-shadow(0 4px 12px rgba(212, 175, 55, 0.3));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .emblem:hover {
            transform: scale(1.05) rotate(2deg);
        }

        h1 {
            font-family: 'Outfit', 'Sarabun', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff 30%, var(--gold-accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 12px 30px rgba(212, 175, 55, 0.08);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            color: var(--gold-accent);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            transition: transform 0.4s ease;
        }

        .card:hover .card-icon {
            transform: scale(1.1);
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #ffffff;
        }

        .card-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            font-weight: 300;
            text-align: center;
        }

        .footer {
            margin-top: auto;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1.5rem;
            width: 100%;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .footer a {
            color: var(--gold-accent);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: var(--gold-hover);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emblem-container">
            <img src="Thai_Garuda_emblem.png" alt="ตราครุฑพ่าห์" class="emblem">
        </div>
        <h1>รัฐธรรมนูญแห่งราชอาณาจักรไทย</h1>
        <p class="subtitle">ฉบับจำลอง (แก้ไขเพิ่มเติม ๒๕๒๕)</p>

        <div class="grid" style="max-width: 480px; margin: 0 auto 3rem;">
            <a href="website_constitution.html" class="card">
                <div class="card-icon">🏛️</div>
                <div class="card-title">รัฐธรรมนูญฉบับเต็ม</div>
                <div class="card-desc">สัมผัสการอ่านรูปแบบใหม่ พร้อมแผนผังโครงสร้างการปกครองแบบมีปฏิสัมพันธ์ (Interactive Org Chart) ค้นหามาตรา และประวัติศาสตร์ฉบับจำลอง</div>
            </a>
        </div>

        <div class="footer">
            <p>เชื่อมต่อระบบจัดเก็บข้อมูลทางกฎหมายจำลอง</p>
            <p style="margin-top: 0.3rem;"><a href="https://github.com/RzSyn/-" target="_blank">Repository: RzSyn/-</a></p>
        </div>
    </div>
</body>
</html>
